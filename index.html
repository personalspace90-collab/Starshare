<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StarShare — Invest in Fame. Profit from Popularity.</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#0d1b2a;--navy2:#112240;--navy3:#1a2f4a;--card:#152035;--card2:#1a2a45;--bord:rgba(255,255,255,.08);--gold:#f0b429;--gold2:#ffd166;--blue:#2563eb;--blue2:#3b82f6;--txt:#e8eaf0;--mut:#8899aa;--ok:#22c55e;--err:#ef4444;}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:var(--navy);color:var(--txt);overflow-x:hidden;}
.page{display:none;min-height:100vh;}.page.active{display:block;}
nav{position:fixed;top:0;left:0;right:0;z-index:999;height:62px;padding:0 2rem;display:flex;align-items:center;justify-content:space-between;background:rgba(13,27,42,.96);border-bottom:1px solid var(--bord);backdrop-filter:blur(12px);}
.logo{display:flex;align-items:center;gap:.4rem;cursor:pointer;font-family:'Montserrat';font-size:1.2rem;font-weight:800;color:var(--txt);}
.logo .star{color:var(--gold);}
.nav-links{display:flex;gap:1.6rem;align-items:center;}
.nav-links a{color:var(--mut);font-size:.84rem;font-weight:500;cursor:pointer;text-decoration:none;transition:color .2s;}
.nav-links a:hover{color:var(--txt);}
.btn{padding:.5rem 1.2rem;border-radius:6px;font-family:'Montserrat';font-weight:700;font-size:.82rem;cursor:pointer;transition:all .18s;border:none;letter-spacing:.2px;}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;}
.btn-gold:hover{opacity:.88;transform:translateY(-1px);}
.btn-blue{background:var(--blue);color:#fff;}
.btn-blue:hover{background:var(--blue2);transform:translateY(-1px);}
.btn-ghost{background:rgba(255,255,255,.06);border:1px solid var(--bord);color:var(--txt);}
.btn-ghost:hover{background:rgba(255,255,255,.1);}
.btn-outline{background:transparent;border:1.5px solid var(--mut);color:var(--txt);}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);}
.btn-lg{padding:.75rem 2rem;font-size:.94rem;}
.btn-sm{padding:.32rem .8rem;font-size:.74rem;}
.btn-full{width:100%;padding:.8rem;font-size:.88rem;}
.hero{min-height:100vh;padding-top:62px;position:relative;overflow:hidden;display:flex;flex-direction:column;}
.hero-bg{position:absolute;inset:0;background:linear-gradient(180deg,#080f1a 0%,#0d1b2a 65%,#060c14 100%);}
.hero-glow{position:absolute;top:0;left:50%;transform:translateX(-50%);width:700px;height:400px;background:radial-gradient(ellipse,rgba(240,180,41,.07) 0%,transparent 70%);pointer-events:none;}
.hero-img{position:absolute;top:62px;left:0;right:0;height:56vh;background:linear-gradient(180deg,rgba(8,15,26,.1) 0%,rgba(8,15,26,.6) 55%,var(--navy) 100%),url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=1400&q=80') center/cover no-repeat;opacity:.5;}
.hero-inner{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:3rem 1.5rem 2rem;}
.hero-badge{display:inline-flex;align-items:center;gap:.4rem;background:rgba(240,180,41,.1);border:1px solid rgba(240,180,41,.28);color:var(--gold);padding:.28rem .9rem;border-radius:50px;font-size:.7rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:1.2rem;}
h1.hero-h1{font-family:'Montserrat';font-size:clamp(2rem,5.5vw,4rem);font-weight:900;line-height:1.08;letter-spacing:-1px;margin-bottom:.9rem;text-shadow:0 2px 24px rgba(0,0,0,.6);}
h1.hero-h1 span{background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero-sub{font-size:.98rem;color:var(--mut);max-width:480px;margin:0 auto 2rem;line-height:1.75;}
.hero-cta{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-bottom:3rem;}
.hero-3{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;max-width:760px;width:100%;margin:0 auto;}
.hf{background:rgba(21,32,53,.88);border:1px solid var(--bord);border-radius:12px;padding:1.4rem 1rem;text-align:center;backdrop-filter:blur(6px);}
.hf-icon{font-size:2rem;margin-bottom:.5rem;}
.hf-t{font-family:'Montserrat';font-weight:700;font-size:.9rem;margin-bottom:.25rem;}
.hf-d{color:var(--mut);font-size:.76rem;line-height:1.5;}
.stats-bar{background:var(--card);border-top:1px solid var(--bord);border-bottom:1px solid var(--bord);padding:1.8rem 2rem;display:flex;justify-content:center;gap:4rem;flex-wrap:wrap;}
.sb-n{font-family:'Montserrat';font-size:1.9rem;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sb-l{color:var(--mut);font-size:.7rem;text-transform:uppercase;letter-spacing:1px;margin-top:.15rem;}
.sec{padding:4rem 2rem;max-width:1200px;margin:0 auto;}
.sec-lbl{display:flex;align-items:center;gap:.7rem;justify-content:center;margin-bottom:.8rem;font-size:.7rem;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:700;}
.sec-lbl::before,.sec-lbl::after{content:'';flex:1;max-width:50px;height:1px;background:var(--gold);opacity:.35;}
.sec-h2{font-family:'Montserrat';font-size:clamp(1.4rem,3vw,2.1rem);font-weight:800;text-align:center;margin-bottom:.4rem;}
.sec-sub{color:var(--mut);text-align:center;font-size:.88rem;margin-bottom:2.5rem;}
.grid-stars{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.2rem;}
.scard{background:var(--card);border:1px solid var(--bord);border-radius:14px;overflow:hidden;transition:all .3s;cursor:pointer;}
.scard:hover{transform:translateY(-5px);border-color:rgba(240,180,41,.3);box-shadow:0 16px 48px rgba(0,0,0,.5);}
.scard-img{height:195px;position:relative;overflow:hidden;}
.scard-img img{width:100%;height:100%;object-fit:cover;object-position:center top;transition:transform .4s;}
.scard:hover .scard-img img{transform:scale(1.06);}
.scard-img-ov{position:absolute;inset:0;background:linear-gradient(180deg,transparent 38%,rgba(10,18,32,.97) 100%);}
.scard-badge{position:absolute;top:.7rem;right:.7rem;background:rgba(240,180,41,.15);border:1px solid rgba(240,180,41,.3);color:var(--gold);padding:.18rem .52rem;border-radius:50px;font-size:.63rem;font-weight:700;}
.scard-name-ov{position:absolute;bottom:.8rem;left:.9rem;}
.scard-name{font-family:'Montserrat';font-size:1rem;font-weight:800;text-shadow:0 1px 8px rgba(0,0,0,.8);}
.scard-role{font-size:.7rem;color:var(--gold2);font-weight:600;}
.scard-body{padding:.95rem;}
.scard-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.45rem;margin-bottom:.85rem;}
.ss{text-align:center;background:var(--card2);border-radius:7px;padding:.45rem .25rem;}
.ss-v{font-family:'Montserrat';font-size:.88rem;font-weight:700;}
.ss-l{font-size:.58rem;color:var(--mut);text-transform:uppercase;letter-spacing:.4px;margin-top:.08rem;}
.scard-prog{background:rgba(255,255,255,.07);border-radius:50px;height:5px;margin-bottom:.35rem;overflow:hidden;}
.scard-bar{height:100%;border-radius:50px;background:linear-gradient(90deg,var(--gold),var(--gold2));}
.scard-prog-lbl{display:flex;justify-content:space-between;font-size:.66rem;color:var(--mut);margin-bottom:.85rem;}
.scard-btns{display:flex;gap:.45rem;}
.scard-btns .btn{flex:1;padding:.5rem;font-size:.77rem;}
.grid-exp{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:1.1rem;}
.ecard{background:var(--card);border:1px solid var(--bord);border-radius:14px;padding:1.5rem;position:relative;overflow:hidden;transition:all .3s;}
.ecard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--gold2));opacity:0;transition:opacity .3s;}
.ecard:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.4);}.ecard:hover::before{opacity:1;}
.ecard-badge{position:absolute;top:1rem;right:1rem;font-size:.63rem;font-weight:700;padding:.18rem .5rem;border-radius:50px;}
.hot{background:rgba(240,180,41,.13);color:var(--gold);border:1px solid rgba(240,180,41,.28);}
.rare{background:rgba(37,99,235,.13);color:var(--blue2);border:1px solid rgba(37,99,235,.28);}
.new2{background:rgba(34,197,94,.1);color:var(--ok);border:1px solid rgba(34,197,94,.22);}
.ecard-icon{font-size:2rem;margin-bottom:.8rem;}
.ecard-title{font-family:'Montserrat';font-size:.97rem;font-weight:700;margin-bottom:.3rem;}
.ecard-desc{color:var(--mut);font-size:.8rem;line-height:1.6;margin-bottom:1rem;}
.ecard-price{font-family:'Montserrat';font-size:1.25rem;font-weight:800;color:var(--gold);margin-bottom:.8rem;}
.ecard-price span{font-size:.72rem;font-weight:400;color:var(--mut);}
.grid-how{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:1.1rem;}
.hcard{background:var(--card);border:1px solid var(--bord);border-radius:14px;padding:1.5rem;text-align:center;transition:all .3s;}
.hcard:hover{border-color:rgba(240,180,41,.22);transform:translateY(-3px);}
.hcard-n{font-family:'Montserrat';font-size:2.3rem;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;margin-bottom:.5rem;}
.hcard-icon{font-size:1.7rem;margin-bottom:.6rem;}
.hcard-t{font-family:'Montserrat';font-weight:700;font-size:.88rem;margin-bottom:.35rem;}
.hcard-d{color:var(--mut);font-size:.78rem;line-height:1.5;}
.cta-box{background:linear-gradient(135deg,#0f2248,#1a3060);border:1px solid rgba(240,180,41,.15);border-radius:20px;padding:3.5rem 2rem;text-align:center;margin:0 2rem 4rem;position:relative;overflow:hidden;}
.cta-box::before{content:'★';position:absolute;font-size:13rem;opacity:.03;right:-1rem;top:-3rem;color:var(--gold);line-height:1;}
.cta-box h2{font-family:'Montserrat';font-size:clamp(1.5rem,3.5vw,2.4rem);font-weight:900;margin-bottom:.65rem;}
.cta-box p{color:var(--mut);margin-bottom:2rem;font-size:.9rem;}
footer{background:var(--navy2);border-top:1px solid var(--bord);padding:2.2rem 2rem;text-align:center;}
.foot-logo{font-family:'Montserrat';font-size:1.1rem;font-weight:800;display:flex;align-items:center;gap:.35rem;justify-content:center;margin-bottom:.4rem;}
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:5rem 1rem 2rem;background:linear-gradient(160deg,#050b14 0%,#0d1b2a 50%,#050b14 100%);position:relative;overflow:hidden;}
.auth-wrap::before{content:'';position:absolute;top:-100px;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(240,180,41,.05) 0%,transparent 70%);pointer-events:none;}
.auth-box{width:420px;max-width:94vw;background:var(--card);border:1px solid var(--bord);border-radius:16px;padding:2.2rem;box-shadow:0 32px 80px rgba(0,0,0,.7);position:relative;z-index:1;}
.auth-logo{display:flex;align-items:center;gap:.45rem;justify-content:center;font-family:'Montserrat';font-size:1.25rem;font-weight:800;margin-bottom:.35rem;}
.auth-tag{color:var(--mut);text-align:center;font-size:.82rem;margin-bottom:1.5rem;}
.auth-box h2{font-family:'Montserrat';font-size:1.3rem;font-weight:800;text-align:center;margin-bottom:1.4rem;}
.fg{display:flex;flex-direction:column;gap:.28rem;margin-bottom:.8rem;}
.fg label{font-size:.72rem;font-weight:600;color:var(--mut);letter-spacing:.3px;}
.fg input,.fg select,.fg textarea{background:rgba(255,255,255,.05);border:1.5px solid var(--bord);color:var(--txt);padding:.63rem .88rem;border-radius:8px;font-family:'Inter';font-size:.88rem;outline:none;width:100%;transition:border-color .2s;}
.fg input:focus,.fg select:focus{border-color:rgba(240,180,41,.45);background:rgba(255,255,255,.07);}
.fg input::placeholder{color:rgba(255,255,255,.22);}
.fg textarea{resize:vertical;min-height:80px;}
.pw-wrap{position:relative;}.pw-wrap input{padding-right:2.7rem;}
.pw-eye{position:absolute;right:.72rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--mut);cursor:pointer;font-size:.85rem;}
.divid{display:flex;align-items:center;gap:.7rem;margin:.8rem 0;color:var(--mut);font-size:.73rem;}
.divid::before,.divid::after{content:'';flex:1;height:1px;background:var(--bord);}
.soc-btns{display:grid;grid-template-columns:1fr 1fr;gap:.55rem;margin-bottom:.8rem;}
.soc-btn{background:rgba(255,255,255,.05);border:1px solid var(--bord);color:var(--txt);padding:.52rem;border-radius:8px;font-family:'Inter';font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.4rem;}
.soc-btn:hover{background:rgba(255,255,255,.09);}
.auth-sw{text-align:center;color:var(--mut);font-size:.81rem;margin-top:.9rem;}
.auth-sw a{color:var(--gold);cursor:pointer;font-weight:600;}
.rem-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.85rem;font-size:.79rem;color:var(--mut);}
.rem-row input{width:auto;}
.dash-layout{display:flex;min-height:100vh;padding-top:62px;}
.dash-sb{width:215px;background:var(--navy2);border-right:1px solid var(--bord);padding:1.3rem 0;position:fixed;top:62px;left:0;bottom:0;overflow-y:auto;}
.sb-sec{padding:.3rem 1.3rem;font-size:.58rem;letter-spacing:2px;text-transform:uppercase;color:var(--mut);margin-top:.7rem;font-weight:700;}
.sb-i{display:flex;align-items:center;gap:.6rem;padding:.68rem 1.3rem;cursor:pointer;color:var(--mut);font-size:.85rem;font-weight:500;transition:all .2s;border-left:2px solid transparent;}
.sb-i:hover,.sb-i.on{color:var(--txt);background:rgba(255,255,255,.04);border-left-color:var(--gold);}
.sb-i .ic{width:17px;text-align:center;font-size:.88rem;}
.sb-div{height:1px;background:var(--bord);margin:.45rem 0;}
.dash-main{margin-left:215px;flex:1;padding:2rem;background:var(--navy);}
.dash-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem;}
.dash-hd h1{font-family:'Montserrat';font-size:1.45rem;font-weight:800;}
.dash-hd p{color:var(--mut);font-size:.82rem;margin-top:.12rem;}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:1rem;margin-bottom:1.5rem;}
.kpi{background:var(--card);border:1px solid var(--bord);border-radius:12px;padding:1.1rem;position:relative;overflow:hidden;}
.kpi::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--gold2));}
.kpi-l{font-size:.63rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--mut);margin-bottom:.35rem;}
.kpi-v{font-family:'Montserrat';font-size:1.65rem;font-weight:800;}
.kpi-s{font-size:.7rem;color:var(--mut);margin-top:.12rem;}
.panel{background:var(--card);border:1px solid var(--bord);border-radius:12px;padding:1.2rem;}
.panel-t{font-family:'Montserrat';font-size:.68rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--mut);border-bottom:1px solid var(--bord);padding-bottom:.65rem;margin-bottom:.9rem;}
.dgrid{display:grid;grid-template-columns:2fr 1fr;gap:1.1rem;}
.wal-card{background:linear-gradient(135deg,#0f2248,#1a3060);border:1px solid rgba(240,180,41,.18);border-radius:14px;padding:1.7rem;margin-bottom:1.2rem;position:relative;overflow:hidden;}
.wal-card::before{content:'';position:absolute;top:-50px;right:-50px;width:160px;height:160px;border-radius:50%;background:rgba(240,180,41,.06);}
.wal-lbl{font-size:.66rem;letter-spacing:2px;text-transform:uppercase;color:var(--mut);margin-bottom:.35rem;font-weight:600;}
.wal-amt{font-family:'Montserrat';font-size:2.3rem;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.wal-sub{color:var(--mut);font-size:.76rem;margin-top:.18rem;}
.wal-actions{display:flex;gap:.7rem;margin-top:1.2rem;}
.wal-btn{flex:1;padding:.62rem;border-radius:8px;font-family:'Montserrat';font-weight:700;font-size:.78rem;cursor:pointer;transition:all .2s;border:none;}
.wal-btn.p{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;}
.wal-btn.s{background:rgba(255,255,255,.07);color:var(--txt);border:1px solid var(--bord);}
.wal-btn.s:hover{background:rgba(255,255,255,.12);}
.tx-row{display:flex;justify-content:space-between;align-items:center;padding:.68rem 0;border-bottom:1px solid var(--bord);font-size:.83rem;}
.tx-row:last-child{border-bottom:none;}
.tx-l{display:flex;align-items:center;gap:.55rem;}
.tx-ico{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.82rem;}
.tx-desc{font-weight:500;font-size:.82rem;}
.tx-date{font-size:.7rem;color:var(--mut);}
.tx-a{font-family:'Montserrat';font-weight:700;}
.tx-a.pos{color:var(--ok);}
.tx-a.neg{color:var(--gold);}
.chart-area{height:155px;margin-top:.4rem;}
.chart-svg{width:100%;height:100%;}
.asec{display:none;}.asec.on{display:block;}
.tbl-wrap{background:var(--card);border:1px solid var(--bord);border-radius:12px;overflow:hidden;overflow-x:auto;}
.tbl{width:100%;border-collapse:collapse;font-size:.81rem;min-width:560px;}
.tbl th{text-align:left;padding:.65rem .9rem;background:rgba(255,255,255,.03);color:var(--mut);font-size:.61rem;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;border-bottom:1px solid var(--bord);}
.tbl td{padding:.78rem .9rem;border-bottom:1px solid var(--bord);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:rgba(255,255,255,.02);}
.tag{padding:.16rem .52rem;border-radius:50px;font-size:.64rem;font-weight:700;}
.t-g{background:rgba(34,197,94,.1);color:var(--ok);border:1px solid rgba(34,197,94,.22);}
.t-y{background:rgba(240,180,41,.1);color:var(--gold);border:1px solid rgba(240,180,41,.22);}
.t-r{background:rgba(239,68,68,.1);color:var(--err);border:1px solid rgba(239,68,68,.2);}
.t-gr{background:rgba(255,255,255,.05);color:var(--mut);border:1px solid var(--bord);}
.abs{display:flex;gap:.3rem;flex-wrap:wrap;}
.akpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:1rem;margin-bottom:1.4rem;}
.ak{background:var(--card);border:1px solid var(--bord);border-radius:12px;padding:1rem;}
.ak-l{color:var(--mut);font-size:.61rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:.3rem;font-weight:700;}
.ak-v{font-family:'Montserrat';font-size:1.6rem;font-weight:800;}
.co-wrap{max-width:900px;margin:0 auto;padding:2.5rem 1.5rem;padding-top:calc(62px + 2rem);}
.co-grid{display:grid;grid-template-columns:1fr 290px;gap:1.5rem;}
.co-title{font-family:'Montserrat';font-size:1.4rem;font-weight:800;margin-bottom:1.5rem;grid-column:1/-1;}
.csum{background:var(--card);border:1px solid var(--bord);border-radius:12px;padding:1.3rem;height:fit-content;position:sticky;top:78px;}
.csum-t{font-size:.68rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--mut);margin-bottom:.9rem;}
.csum-row{display:flex;justify-content:space-between;padding:.38rem 0;font-size:.84rem;color:var(--mut);}
.csum-tot{display:flex;justify-content:space-between;border-top:1px solid var(--bord);margin-top:.5rem;padding-top:.75rem;font-family:'Montserrat';font-weight:800;font-size:.97rem;}
.wbb{background:linear-gradient(135deg,rgba(34,197,94,.07),rgba(34,197,94,.04));border:1px solid rgba(34,197,94,.18);border-radius:10px;padding:.9rem;margin-bottom:1rem;}
.wbb-l{font-size:.62rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--mut);margin-bottom:.18rem;}
.wbb-v{font-family:'Montserrat';font-size:1.25rem;font-weight:800;color:var(--ok);}
.btc-addr{background:rgba(0,0,0,.3);border:1px solid var(--bord);border-radius:8px;padding:.62rem .88rem;font-family:monospace;font-size:.73rem;color:var(--gold);word-break:break-all;margin:.55rem 0;}
.deliv-wrap{max-width:540px;margin:0 auto;padding:4rem 1.5rem;padding-top:calc(62px + 3rem);text-align:center;}
.deliv-icon{font-size:3.8rem;margin-bottom:.9rem;animation:pop .5s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes pop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.deliv-t{font-family:'Montserrat';font-size:1.7rem;font-weight:900;color:var(--gold);margin-bottom:.35rem;}
.cred-box{background:var(--card);border:1px solid var(--bord);border-radius:12px;padding:1.3rem;text-align:left;margin-bottom:1.1rem;}
.cred-bt{font-size:.62rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--mut);margin-bottom:.85rem;}
.cred-row{display:flex;justify-content:space-between;align-items:center;padding:.52rem 0;border-bottom:1px solid var(--bord);}
.cred-row:last-child{border-bottom:none;}
.cred-k{color:var(--mut);font-size:.8rem;}
.cred-v{font-family:monospace;font-size:.8rem;color:var(--gold);word-break:break-all;max-width:60%;}
.copy-btn{background:rgba(255,255,255,.05);border:1px solid var(--bord);color:var(--mut);padding:.16rem .48rem;border-radius:5px;font-size:.64rem;cursor:pointer;transition:all .15s;}
.copy-btn:hover{color:var(--txt);border-color:var(--gold);}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:9999;opacity:0;pointer-events:none;transition:opacity .22s;backdrop-filter:blur(4px);}
.mo.open{opacity:1;pointer-events:all;}
.mo-box{background:var(--card);border:1px solid var(--bord);border-radius:16px;padding:2rem;max-width:390px;width:92%;text-align:center;transform:scale(.92);transition:transform .22s;box-shadow:0 32px 80px rgba(0,0,0,.8);}

.mo-box p{color:var(--mut);font-size:.84rem;line-height:1.6;margin-bottom:1.2rem;}
.mo-box2{background:var(--card);border:1px solid var(--bord);border-radius:16px;padding:1.6rem;max-width:360px;width:92%;transform:scale(.92);transition:transform .22s;box-shadow:0 32px 80px rgba(0,0,0,.8);}

.mo-box2 h3{font-family:'Montserrat';font-size:1.05rem;font-weight:800;margin-bottom:.38rem;}
.rel-mo{background:var(--card);border:1px solid var(--bord);border-radius:16px;padding:1.75rem;max-width:430px;width:93%;transform:scale(.92);transition:transform .22s;box-shadow:0 32px 80px rgba(0,0,0,.8);}

.rel-mo h3{font-family:'Montserrat';font-size:1.05rem;font-weight:800;margin-bottom:.9rem;}
.dep-mo{background:var(--card);border:1px solid var(--bord);border-radius:16px;padding:1.9rem;max-width:350px;width:92%;transform:scale(.92);transition:transform .22s;box-shadow:0 32px 80px rgba(0,0,0,.8);}
.mo.open .dep-mo{transform:scale(1);}
.dep-mo h3{font-family:'Montserrat';font-size:1.15rem;font-weight:800;margin-bottom:.28rem;}
.mo-btns{display:flex;gap:.55rem;justify-content:flex-end;margin-top:.9rem;}
#toast{position:fixed;bottom:1.8rem;right:1.8rem;background:var(--card);border:1px solid var(--bord);border-radius:10px;padding:.75rem 1.2rem;color:var(--txt);font-weight:600;z-index:99999;transform:translateY(100px);opacity:0;transition:all .3s;max-width:270px;font-size:.83rem;box-shadow:0 8px 32px rgba(0,0,0,.6);}
.back-fab{position:fixed;bottom:1.4rem;left:1.4rem;z-index:8000;background:var(--card);border:1px solid var(--bord);color:var(--mut);padding:.48rem .95rem;border-radius:50px;font-family:'Inter';font-weight:600;font-size:.76rem;cursor:pointer;transition:all .2s;display:none;box-shadow:0 4px 16px rgba(0,0,0,.5);}
.back-fab:hover{color:var(--gold);border-color:rgba(240,180,41,.38);}
.mobnav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--navy2);border-top:1px solid var(--bord);z-index:9000;padding:.48rem 0 .35rem;}
.mob-btn{display:flex;flex-direction:column;align-items:center;gap:.13rem;cursor:pointer;color:var(--mut);font-size:.54rem;letter-spacing:.5px;text-transform:uppercase;font-weight:700;padding:.22rem .38rem;border-radius:6px;transition:all .2s;min-width:48px;}
.mob-btn:hover,.mob-btn.on{color:var(--gold);}
.mob-btn span{font-size:1.05rem;}
@media(max-width:860px){.dash-sb{display:none!important;}.dash-main{margin-left:0!important;padding-bottom:80px;}.co-grid{grid-template-columns:1fr;}.dgrid{grid-template-columns:1fr;}.mobnav{display:flex;justify-content:space-around;}}
